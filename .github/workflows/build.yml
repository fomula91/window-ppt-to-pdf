name: Build Windows exe

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# 최소 권한 원칙: 워크플로 기본은 읽기 전용, 릴리스 발행 스텝에서만 쓰기 권한 필요.
permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      # 태그 푸시 시 Release 발행을 위해 contents:write 필요. 이 잡 범위로만 제한.
      contents: write

    steps:
      # 아래 서드파티 액션들은 공급망 공격 완화를 위해 전체 커밋 SHA 로 고정.
      # 태그 주석은 사람이 읽기 쉬우라고 남긴 라벨. 업데이트 시에는 Dependabot
      # (.github/dependabot.yml) 이 SHA 를 갱신하도록 설정하기를 권장.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe with PyInstaller
        run: pyinstaller --onefile --windowed --name ppt2pdf --clean app.py

      - name: Verify build output and generate SHA256SUMS
        run: |
          if (-not (Test-Path "dist\ppt2pdf.exe")) {
            Write-Error "dist\ppt2pdf.exe not found"
            exit 1
          }
          $size = (Get-Item "dist\ppt2pdf.exe").Length / 1MB
          Write-Host ("Built ppt2pdf.exe ({0:N2} MB)" -f $size)

          # Release/아티팩트 무결성 검증용 해시 파일 생성.
          $hash = (Get-FileHash "dist\ppt2pdf.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  ppt2pdf.exe" | Out-File -FilePath "dist\SHA256SUMS.txt" -Encoding ascii -NoNewline
          Write-Host "SHA256: $hash"

      - name: Upload artifact (non-release builds)
        if: startsWith(github.ref, 'refs/tags/v') == false
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ppt2pdf-windows
          path: |
            dist/ppt2pdf.exe
            dist/SHA256SUMS.txt
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            dist/ppt2pdf.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## 다운로드

            - `ppt2pdf.exe` — 실행 파일
            - `SHA256SUMS.txt` — 해시 검증용

            **무결성 검증 (필수)**: 다운받은 exe 가 변조되지 않았는지
            아래 PowerShell 명령으로 반드시 확인하세요.
            ```powershell
            Get-FileHash ppt2pdf.exe -Algorithm SHA256
            ```
            출력된 해시가 `SHA256SUMS.txt` 의 값과 **정확히 일치**해야 합니다.
            일치하지 않으면 실행하지 마세요.

            **요구사항**: Windows 10 이상, Microsoft PowerPoint 설치 필수.

name: Build Windows exe

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

# 최소 권한 원칙: 워크플로 기본은 읽기 전용, 릴리스 발행 스텝에서만 쓰기 권한 필요.
permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    permissions:
      # 태그 푸시 시 Release 발행을 위해 contents:write 필요. 이 잡 범위로만 제한.
      contents: write

    steps:
      # 아래 서드파티 액션들은 공급망 공격 완화를 위해 전체 커밋 SHA 로 고정.
      # 태그 주석은 사람이 읽기 쉬우라고 남긴 라벨. 업데이트 시에는 Dependabot
      # (.github/dependabot.yml) 이 SHA 를 갱신하도록 설정하기를 권장.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe with PyInstaller
        run: pyinstaller --onefile --windowed --name ppt2pdf --clean app.py

      - name: Verify build output and generate SHA256SUMS
        id: build_info
        run: |
          if (-not (Test-Path "dist\ppt2pdf.exe")) {
            Write-Error "dist\ppt2pdf.exe not found"
            exit 1
          }
          $size = (Get-Item "dist\ppt2pdf.exe").Length / 1MB
          Write-Host ("Built ppt2pdf.exe ({0:N2} MB)" -f $size)

          # Release/아티팩트 무결성 검증용 해시 파일 생성.
          $hash = (Get-FileHash "dist\ppt2pdf.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  ppt2pdf.exe" | Out-File -FilePath "dist\SHA256SUMS.txt" -Encoding ascii -NoNewline
          Write-Host "SHA256: $hash"

          # 아카이브 Release 용 날짜 기반 태그 (KST 기준, run_number 로 충돌 방지).
          $date = (Get-Date).ToUniversalTime().AddHours(9).ToString("yyyyMMdd-HHmm")
          $archiveTag = "archive-$date-${{ github.run_number }}"
          "archive_tag=$archiveTag"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "archive_name=Archive $date"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "build_date=$date"               | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Archive tag: $archiveTag"

      # 감사·재현을 위해 모든 빌드의 산출물을 Actions 아티팩트로도 보관.
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ppt2pdf-windows
          path: |
            dist/ppt2pdf.exe
            dist/SHA256SUMS.txt
          retention-days: 30

      # 1) 롤링 "latest" 프리릴리스 — 항상 한 개만 유지, 매 빌드마다 덮어씀.
      #    Windows 사용자에게 공유할 고정 URL: .../releases/tag/latest
      - name: Publish rolling "latest" pre-release
        if: startsWith(github.ref, 'refs/tags/v') == false
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: latest
          name: "Latest build"
          prerelease: true
          make_latest: "false"
          files: |
            dist/ppt2pdf.exe
            dist/SHA256SUMS.txt
          body: |
            ## 최신 자동 빌드 (main 브랜치)

            - 빌드 시각 (KST): **${{ steps.build_info.outputs.build_date }}**
            - 커밋: `${{ github.sha }}`
            - 실행 로그: [run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            과거 빌드는 [아카이브 릴리스](../../releases?q=archive-)에서 다운받을 수 있습니다.
            안정판은 [버전 태그 릴리스](../../releases?q=v)를 사용하세요.

            ### 무결성 검증 (필수)
            ```powershell
            Get-FileHash ppt2pdf.exe -Algorithm SHA256
            ```
            값이 `SHA256SUMS.txt` 와 일치해야 합니다.

            **요구사항**: Windows 10 이상, Microsoft PowerPoint 설치 필수.

      # 2) 아카이브 릴리스 — 매 빌드마다 새로운 날짜 태그로 영구 보존.
      #    태그 형식: archive-YYYYMMDD-HHMM-<run_number>
      - name: Publish archive release
        if: startsWith(github.ref, 'refs/tags/v') == false
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          tag_name: ${{ steps.build_info.outputs.archive_tag }}
          name: ${{ steps.build_info.outputs.archive_name }}
          prerelease: true
          make_latest: "false"
          files: |
            dist/ppt2pdf.exe
            dist/SHA256SUMS.txt
          body: |
            ## 아카이브 빌드

            - 빌드 시각 (KST): **${{ steps.build_info.outputs.build_date }}**
            - 커밋: `${{ github.sha }}`
            - 실행 로그: [run #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            과거 시점의 빌드를 보존하기 위한 아카이브입니다.
            최신 빌드는 [`latest`](../../releases/tag/latest) 를,
            안정판은 [버전 태그 릴리스](../../releases?q=v)를 사용하세요.

      # 태그 푸시 시 버전 Release를 별도로 발행.
      - name: Create versioned GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            dist/ppt2pdf.exe
            dist/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## 다운로드

            - `ppt2pdf.exe` — 실행 파일
            - `SHA256SUMS.txt` — 해시 검증용

            **무결성 검증 (필수)**: 다운받은 exe 가 변조되지 않았는지
            아래 PowerShell 명령으로 반드시 확인하세요.
            ```powershell
            Get-FileHash ppt2pdf.exe -Algorithm SHA256
            ```
            출력된 해시가 `SHA256SUMS.txt` 의 값과 **정확히 일치**해야 합니다.
            일치하지 않으면 실행하지 마세요.

            **요구사항**: Windows 10 이상, Microsoft PowerPoint 설치 필수.
